name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumi
          POSTGRES_USER: lumi
          POSTGRES_PASSWORD: lumi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lumi -d lumi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://lumi:lumi@localhost:5432/lumi
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: mock
      TELEGRAM_BOT_TOKEN: 123456789:TEST-TOKEN-for-tests-only
      ALLOWED_TELEGRAM_USER_IDS: "777000"
      APP_ENV: local
      DEV_AUTH_ENABLED: "false"
      AUTO_MIGRATE: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install backend dependencies
        run: |
          uv venv
          uv pip install -r pyproject.toml
          uv pip install --no-deps -e .
      - name: Lint backend
        run: uv run ruff check .
      - name: Typecheck backend
        run: uv run mypy src/lumi
      - name: Test backend
        run: uv run pytest -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test:run
      - name: Build frontend
        run: npm run build
