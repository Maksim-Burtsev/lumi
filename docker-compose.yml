name: ${COMPOSE_PROJECT_NAME:-lumi}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumi}
      POSTGRES_USER: ${POSTGRES_USER:-lumi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${LUMI_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumi} -d ${POSTGRES_DB:-lumi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${LUMI_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    image: lumi-backend
    command: uvicorn lumi.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      SERVICE_ROLE: api
    ports:
      - "${LUMI_API_PORT:-8000}:8000"
    volumes:
      - ./data/files:/app/data/files
      - ./data/secrets:/app/data/secrets
      - ./frontend/dist:/app/static/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    image: lumi-backend
    command: python -m lumi.bot.runner
    env_file: .env
    environment:
      SERVICE_ROLE: bot
    volumes:
      - ./data/files:/app/data/files
      - ./data/secrets:/app/data/secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: lumi-backend
    command: python -m lumi.worker.main
    env_file: .env
    environment:
      SERVICE_ROLE: worker
    volumes:
      - ./data/files:/app/data/files
      - ./data/secrets:/app/data/secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: lumi-backend
    command: python -m lumi.scheduler.main
    env_file: .env
    environment:
      SERVICE_ROLE: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
